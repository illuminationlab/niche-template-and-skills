<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{H1}} — NeedleMoved</title>
<!-- HERO IMAGE: ~1080x1350 (4:5). Replace src with the hosted URL when published
     (Drive direct: https://drive.google.com/uc?export=view&id=FILE_ID). -->
<style>
  :root{--teal:#00b0b8;--navy:#002445;--dark-teal:#007a80;--ink:#33414f;--muted:#6b7888;}
  *{box-sizing:border-box;}
  body{margin:0;background:#f6f8fa;color:var(--ink);line-height:1.65;
    font-family:-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;}
  .article{max-width:720px;margin:40px auto;background:#fff;border-radius:16px;overflow:hidden;
    box-shadow:0 10px 40px rgba(0,36,69,.08);}
  .hero{width:100%;height:auto;display:block;}
  .body{padding:40px 48px 8px;}
  .eyebrow{color:var(--teal);font-weight:700;letter-spacing:.08em;text-transform:uppercase;font-size:13px;margin:0 0 12px;}
  h1{color:var(--navy);font-size:34px;line-height:1.15;margin:0 0 24px;font-weight:800;}
  p{font-size:18px;margin:0 0 20px;}
  .lead{font-size:20px;color:var(--navy);font-weight:600;}
  strong{color:var(--navy);}
  .cta{display:inline-block;background:var(--teal);color:#fff;text-decoration:none;font-weight:700;
    font-size:17px;padding:16px 34px;border-radius:10px;margin:8px 0 4px;}
  .ps{font-style:italic;color:var(--muted);font-size:16px;border-left:3px solid var(--teal);
    padding-left:16px;margin:32px 0 8px;}
  .footer{padding:24px 48px 40px;color:var(--muted);font-size:13px;border-top:1px solid #eef1f4;margin-top:24px;}
  @media(max-width:600px){.body{padding:28px 22px 4px;}h1{font-size:26px;}p{font-size:17px;}.footer{padding:20px 22px 32px;}}
</style>
</head>
<body>
  <article class="article">
    <img class="hero" src="{{HERO_IMG_SRC}}" alt="{{H1}}">
    <div class="body">
      <p class="eyebrow">{{EYEBROW}}</p>
      <h1>{{H1}}</h1>
      <p class="lead">{{LEAD}}</p>
      {{BODY_PARAGRAPHS}}
      <p><a class="cta" href="{{BOOKING_URL}}">{{CTA_TEXT}} &rarr;</a></p>
      <p class="ps">{{PS}}</p>
    </div>
    <div class="footer">NeedleMoved &middot; Powered by Illumination Lab</div>
  </article>
</body>
</html>
